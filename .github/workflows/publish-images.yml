name: Publish Images

on:
  workflow_dispatch:
    inputs:
      codex_release:
        description: Codex CLI release to install in the image
        required: false
        default: ''
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve Codex release
        id: codex-release
        env:
          INPUT_CODEX_RELEASE: ${{ inputs.codex_release }}
        run: |
          set -eu
          . ./codex-release.env
          if [ -n "${INPUT_CODEX_RELEASE:-}" ]; then
            CODEX_RELEASE="$INPUT_CODEX_RELEASE"
          fi
          test -n "${CODEX_RELEASE:-}" || { echo 'CODEX_RELEASE is empty'; exit 1; }
          echo "CODEX_RELEASE=$CODEX_RELEASE" >> "$GITHUB_ENV"
          echo "codex_release=$CODEX_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Check Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo 'Missing secret DOCKERHUB_USERNAME'; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo 'Missing secret DOCKERHUB_TOKEN'; exit 1; }

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=codex-${{ steps.codex-release.outputs.codex_release }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            CODEX_RELEASE=${{ steps.codex-release.outputs.codex_release }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
